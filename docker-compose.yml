services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smart-mirror-mosquitto
    env_file:
      - ./backend/.env
    command: >
      sh -lc '
        test -n "$$MQTT_USERNAME" &&
        test -n "$$MQTT_PASSWORD" &&
        mosquitto_passwd -b -c /mosquitto/data/mosquitto.passwd "$$MQTT_USERNAME" "$$MQTT_PASSWORD" &&
        chown mosquitto:mosquitto /mosquitto/data/mosquitto.passwd &&
        chmod 600 /mosquitto/data/mosquitto.passwd &&
        exec mosquitto -c /mosquitto/config/mosquitto.conf
      '
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /mosquitto/data
      - /mosquitto/log
    restart: unless-stopped

  sensor:
    build:
      context: ./sensor
      dockerfile: Dockerfile
    container_name: smart-mirror-sensor
    working_dir: /tmp
    command: ["python3", "/app/dht22_server.py"]
    environment:
      - BLINKA_FORCECHIP=BCM2XXX
      - BLINKA_FORCEBOARD=RASPBERRY_PI_5
      - RPI_LGPIO_REVISION=d04170
    devices:
      - /dev/gpiomem0:/dev/gpiomem
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiochip4:/dev/gpiochip4
    expose:
      - "5555"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  camera:
    build:
      context: ./camera
      dockerfile: Dockerfile
    container_name: smart-mirror-camera
    user: "1000:1000"
    group_add:
      - "44"
    environment:
      - CAMERA_CAPTURE_FPS=20
      - CAMERA_STREAM_FPS=20
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    expose:
      - "5556"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smart-mirror-backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SENSOR_URL=http://sensor:5555
      - CAMERA_URL=http://camera:5556
      - DHT22_GPIO_PIN=4
      - DISPLAY=:0
      - WAYLAND_DISPLAY=wayland-0
      - XDG_RUNTIME_DIR=/run/user/1000
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
    ports:
      - "80:3001"
    user: "1000:1000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/data/photos:/app/data/photos
      - ./backend/.env:/app/.env:ro
      - /var/run/dbus:/var/run/dbus
      - /run/NetworkManager:/run/NetworkManager:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - /sys/class/drm:/sys/class/drm
      - /run/user/1000:/run/user/1000
    depends_on:
      - mosquitto
      - sensor
      - camera
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  display:
    build:
      context: ./display
      dockerfile: Dockerfile
    container_name: smart-mirror-display
    environment:
      - TZ=America/Chicago
    ports:
      - "3000:3000"
    depends_on:
      - backend
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

